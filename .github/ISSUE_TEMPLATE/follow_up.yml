name: Follow-up
description: Capture non-blocking future work from a review, audit, or PR.
title: "follow-up: "
labels:
  - "type: follow-up"
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link the PR, issue, review, or doc that produced this follow-up.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change later?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Value
      description: Why is this worth doing?
  - type: input
    id: related_work
    attributes:
      label: Related epic or ticket
      placeholder: sheet-0061, sheet-0062, or #123
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P3
        - P2
        - P1
        - P0
    validations:
      required: true
