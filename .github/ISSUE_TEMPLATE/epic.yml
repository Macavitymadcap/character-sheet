name: Epic
description: Plan a multi-ticket Campaign Ledger outcome.
title: "sheet-0000: "
labels:
  - "type: epic"
body:
  - type: input
    id: identifier
    attributes:
      label: Identifier
      description: Use the accepted `sheet-*` identifier for this epic.
      placeholder: sheet-0061
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What outcome should this epic deliver?
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Goals
      placeholder: |
        -
        -
        -
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should stay out of this epic?
      placeholder: |
        -
        -
  - type: textarea
    id: ticket_map
    attributes:
      label: Ticket map
      description: Link planned child issues and Markdown ticket docs when known.
      placeholder: |
        - [ ] sheet-0062
        - [ ] sheet-0063
  - type: textarea
    id: durable_docs
    attributes:
      label: Durable docs
      description: Link the epic doc, architecture notes, operations docs, or ticket docs this work depends on.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        -
        -
        -
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      placeholder: |
        - [ ] `bun run verify`
        - [ ] Screenshots or Pa11y checks, if user-facing
